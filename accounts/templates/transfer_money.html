<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Transfer | Modern Bank</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; padding-top: 50px; }
        .transfer-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1e293b; margin-bottom: 25px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        #accountDetails { margin-top: 20px; padding: 15px; background: #f0f9ff; border-radius: 12px; display: none; }
    </style>
</head>
<body>
    <div class="transfer-card">
        <h2><i class="fa-solid fa-money-bill-transfer"></i> Secure Transfer</h2>
        <form method="POST" id="transferForm">
            {% csrf_token %}
            <div class="form-group">
                <label>Bank</label>
                <input type="text" id="bankCode" name="bank_code" placeholder="Enter Bank Code (e.g. 058)" required>
            </div>
            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="accNum" name="account_number" placeholder="Enter Account Number" required onblur="resolveAcc()">
            </div>
            <div id="accountDetails"></div>
            <div class="form-group">
                <label>Amount (₦)</label>
                <input type="number" name="amount" placeholder="0.00" required>
            </div>
            <button type="submit">Transfer Funds</button>
        </form>
    </div>

    <script>
        async function resolveAcc() {
            const acc = document.getElementById('accNum').value;
            const bank = document.getElementById('bankCode').value;
            if(acc.length === 10 && bank) {
                const res = await fetch(`/resolve-account/?account_number=${acc}&bank_code=${bank}`);
                const data = await res.json();
                const div = document.getElementById('accountDetails');
                if(data.account_name) {
                    div.style.display = 'block';
                    div.innerHTML = `<strong>Recipient: ${data.account_name}</strong>`;
                }
            }
        }
    </script>
</body>
</html>
