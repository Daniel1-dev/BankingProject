<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Modern Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl" x-data="{ username: '', password: '', get isFormValid() { return this.username !== '' && this.password !== '' } }">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600">Modern Bank</h1>
            <p class="text-gray-500 mt-2">Welcome back! Please login to your account.</p>
        </div>

        {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
            <div class="bg-red-100 text-red-700 p-4 rounded-xl text-sm font-medium mb-2">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <input type="text" name="username" x-model="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Enter your username" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" name="password" x-model="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
            </div>
            <button type="submit" :disabled="!isFormValid" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold py-4 rounded-2xl transition shadow-lg">Login</button>
        </form>

        <div class="text-center mt-6">
            <p class="text-sm text-gray-600">Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline">Register here</a></p>
        </div>
    </div>
</body>
</html>
