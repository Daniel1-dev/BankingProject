<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Bills • Modern Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="bg-white p-8 rounded-3xl shadow-lg max-w-sm mx-auto">
        <h1 class="text-2xl font-bold mb-6">Pay Bills</h1>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold mb-2">Biller</label>
                <select name="biller" class="w-full p-3 rounded-xl border border-gray-300 outline-none">
                    <option>Electricity (IKEDC)</option>
                    <option>DSTV Subscription</option>
                    <option>Bet9ja Funding</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Account ID</label>
                <input type="text" name="account_id" class="w-full p-3 rounded-xl border border-gray-300 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-4 rounded-2xl">Pay Now</button>
        </form>
    </div>
</body>
</html>
