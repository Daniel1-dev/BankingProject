<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data • Modern Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="bg-white p-8 rounded-3xl shadow-lg max-w-sm mx-auto">
        <h1 class="text-2xl font-bold mb-6">Buy Data</h1>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold mb-2">Network</label>
                <select name="network" class="w-full p-3 rounded-xl border border-gray-300 outline-none">
                    <option>MTN</option>
                    <option>Airtel</option>
                    <option>Glo</option>
                    <option>9mobile</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Plan</label>
                <select name="plan" class="w-full p-3 rounded-xl border border-gray-300 outline-none">
                    <option value="500MB">500MB - ₦500</option>
                    <option value="1GB">1GB - ₦1,000</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl">Proceed</button>
        </form>
    </div>
</body>
</html>
