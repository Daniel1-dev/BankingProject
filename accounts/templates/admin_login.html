<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login • Contribution Tracker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 40%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floating particles animation */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(37, 99, 235, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Main Card */
        .login-container {
            width: 100%;
            max-width: 480px;
            margin: auto;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
        }

        /* Header Section */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .icon-circle {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            width: 80px;
            height: 80px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
            position: relative;
        }

        .icon-circle::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 60px;
            opacity: 0.5;
            filter: blur(8px);
            z-index: -1;
        }

        .icon-circle i {
            font-size: 2.2rem;
            color: white;
        }

        .login-header h2 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.85rem;
        }

        /* Messages/Alerts */
        .messages-container {
            margin-bottom: 1.5rem;
        }

        .alert-message {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border-left: 4px solid #ef4444;
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #991b1b;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: linear-gradient(135deg, #dcfce7, #d1fae5);
            border-left-color: #22c55e;
            color: #15803d;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-12px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #334155;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .form-group label i {
            margin-right: 6px;
            color: #2563eb;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 16px 15px 48px;
            font-size: 0.95rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-family: 'Inter', monospace;
            transition: all 0.25s;
            background: white;
            color: #1e293b;
            font-weight: 500;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-wrapper input:focus + i {
            color: #2563eb;
        }

        .input-wrapper input::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        /* Password Toggle */
        .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
            background: transparent;
            border: none;
            width: auto;
            padding: 0;
            margin: 0;
            box-shadow: none;
            font-size: 1rem;
        }

        .toggle-password:hover {
            color: #2563eb;
            transform: scale(1.1);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #1d4ed8, #6d28d9);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        /* Footer Links */
        .link {
            text-align: center;
            margin-top: 1.8rem;
            padding-top: 1.2rem;
            border-top: 1px solid #eef2f6;
        }

        .link a {
            text-decoration: none;
            color: #2563eb;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 40px;
        }

        .link a:hover {
            color: #7c3aed;
            background: #f8fafc;
            transform: translateX(-2px);
        }

        /* Security Badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .security-badge span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Responsive */
        @media (max-width: 500px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 1.8rem;
            }
            .login-header h2 {
                font-size: 1.5rem;
            }
            .icon-circle {
                width: 65px;
                height: 65px;
            }
            .icon-circle i {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<!-- Floating particles -->
<div id="particles"></div>

<div class="login-container">
    <div class="card">
        <!-- Header with Icon -->
        <div class="login-header">
            <div class="icon-circle">
                <i class="fa-solid fa-shield-haltered"></i>
            </div>
            <h2>Admin Portal</h2>
            <p>Secure access for administrators</p>
        </div>

        <!-- Django Messages (preserved logic) -->
        {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
            <div class="alert-message {% if message.tags == 'success' %}alert-success{% endif %}">
                <i class="fa-solid {% if message.tags == 'success' %}fa-circle-check{% else %}fa-circle-exclamation{% endif %}"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Login Form (Django backend logic preserved) -->
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label><i class="fa-regular fa-user"></i> Admin Username</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" 
                           name="username" 
                           placeholder="Enter admin username"
                           autocomplete="username"
                           required>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-regular fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-lock"></i>
                    <input type="password" 
                           name="password" 
                           id="passwordField"
                           placeholder="Enter password"
                           autocomplete="current-password"
                           required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fa-regular fa-eye-slash" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Login to Admin Panel
            </button>
        </form>

        <!-- Footer Links -->
        <div class="link">
            <a href="{% url 'login' %}">
                <i class="fa-solid fa-arrow-left"></i> Back to User Login
            </a>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
            <span><i class="fa-solid fa-lock"></i> SSL Encryption</span>
            <span><i class="fa-solid fa-shield"></i> Secure Portal</span>
            <span><i class="fa-regular fa-clock"></i> 24/7 Access</span>
        </div>
    </div>
</div>

<script>
    // Password Toggle Functionality
    function togglePassword() {
        const passwordField = document.getElementById('passwordField');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordField && toggleIcon) {
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }
    }

    // Input focus effects
    const inputs = document.querySelectorAll('.input-wrapper input');
    inputs.forEach(input => {
        input.addEventListener('focus', function() {
            this.parentElement.style.transform = 'scale(1.01)';
        });
        input.addEventListener('blur', function() {
            this.parentElement.style.transform = 'scale(1)';
        });
    });

    // Create floating particles
    function createParticles() {
        const particleContainer = document.getElementById('particles');
        if (!particleContainer) return;
        
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = Math.random() * 6 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = Math.random() * 10 + 10 + 's';
            particle.style.background = `rgba(${Math.random() * 100 + 100}, ${Math.random() * 100 + 100}, 255, ${Math.random() * 0.3 + 0.1})`;
            particleContainer.appendChild(particle);
        }
    }

    // Initialize particles on load
    document.addEventListener('DOMContentLoaded', createParticles);
</script>

</body>
</html>
