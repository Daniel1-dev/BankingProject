<!DOCTYPE html>
<html>

<head>

<title>Admin Profile</title>

<style>

body{
background:#f2f4f8;
font-family:Arial;
}

.card{

max-width:500px;
margin:30px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);

}

input{

width:100%;
padding:12px;
margin:10px 0;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;

}

img{

width:100px;
height:100px;
border-radius:50%;
display:block;
margin:auto;

}

</style>

</head>

<body>

<div class="card">

<h2>Admin Account Settings</h2>

{% if error %}
<p style="color:red;">
{{error}}
</p>
{% endif %}

{% if success %}
<p style="color:green;">
{{success}}
</p>
{% endif %}


{% if profile.profile_picture %}
<img src="{{profile.profile_picture.url}}">
{% endif %}


<form method="POST"
enctype="multipart/form-data">

{% csrf_token %}

<input
type="text"
name="username"
value="{{request.user.username}}">

<input
type="email"
name="email"
value="{{request.user.email}}">

<input
type="file"
name="profile_picture">

<input
type="password"
name="new_password"
placeholder="New password">

<input
type="password"
name="confirm_password"
placeholder="Confirm password">

<button>

Save Changes

</button>

</form>

</div>

</body>

</html>
