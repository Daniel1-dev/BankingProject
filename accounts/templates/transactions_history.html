<!DOCTYPE html>
<html>
<head><title>Transactions</title></head>
<body>
    <h1>Transaction History</h1>
    <table>
        {% for t in transactions %}
        <tr>
            <td>{{ t.timestamp }}</td>
            <td>{{ t.transaction_type }}</td>
            <td>₦{{ t.amount }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
