<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services • Modern Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen pb-20">
    <header class="bg-blue-600 text-white p-6 rounded-b-3xl mb-6">
        <h1 class="text-xl font-bold">Services</h1>
    </header>

    <div class="px-6 space-y-4">
        <a href="{% url 'airtime' %}" class="block bg-white p-6 rounded-2xl shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-blue-100 p-3 rounded-xl text-blue-600"><i class="fa-solid fa-mobile-screen"></i></div>
                <span class="font-bold">Buy Airtime</span>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-400"></i>
        </a>
        <a href="{% url 'data' %}" class="block bg-white p-6 rounded-2xl shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-green-100 p-3 rounded-xl text-green-600"><i class="fa-solid fa-wifi"></i></div>
                <span class="font-bold">Buy Data</span>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-400"></i>
        </a>
        <a href="{% url 'bills' %}" class="block bg-white p-6 rounded-2xl shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-100 p-3 rounded-xl text-yellow-600"><i class="fa-solid fa-lightbulb"></i></div>
                <span class="font-bold">Pay Bills</span>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-400"></i>
        </a>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-lg flex justify-around border-t">
        <a href="{% url 'dashboard' %}" class="text-gray-400 flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px]">Home</span></a>
        <a href="{% url 'services' %}" class="text-blue-600 flex flex-col items-center"><i class="fa-solid fa-grip"></i><span class="text-[10px]">Services</span></a>
    </nav>
</body>
</html>
