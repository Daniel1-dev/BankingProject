<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register • Modern Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600">Join Modern Bank</h1>
            <p class="text-gray-500 mt-2">Create your account to start banking</p>
        </div>

        {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
            <div class="bg-red-100 text-red-700 p-4 rounded-xl text-sm font-medium mb-2">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" class="space-y-4" id="registrationForm">
            {% csrf_token %}
            
            <!-- Section 1: Personal Info -->
            <div id="section1" class="space-y-4">
                <h2 class="text-lg font-bold text-gray-700">Personal Information</h2>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Username</label>
                    <input type="text" name="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Full Name</label>
                    <input type="text" name="full_name" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Gender</label>
                    <select name="gender" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="button" onclick="nextSection('section1', 'section2')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Next</button>
            </div>

            <!-- Section 2: Contact Info -->
            <div id="section2" class="space-y-4 hidden">
                <h2 class="text-lg font-bold text-gray-700">Contact Details</h2>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Email</label>
                    <input type="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Phone Number</label>
                    <input type="tel" name="phone_number" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Profile Picture</label>
                    <input type="file" name="profile_picture" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="nextSection('section2', 'section1')" class="w-1/2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl transition">Back</button>
                    <button type="button" onclick="nextSection('section2', 'section3')" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Next</button>
                </div>
            </div>

            <!-- Section 3: Account Security -->
            <div id="section3" class="space-y-4 hidden">
                <h2 class="text-lg font-bold text-gray-700">Security</h2>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Address</label>
                    <input type="text" name="address" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Password</label>
                    <input type="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="nextSection('section3', 'section2')" class="w-1/2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl transition">Back</button>
                    <button type="submit" class="w-1/2 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">Register</button>
                </div>
            </div>
        </form>

        <script>
            function nextSection(current, next) {
                document.getElementById(current).classList.add('hidden');
                document.getElementById(next).classList.remove('hidden');
            }
        </script>

        <div class="text-center mt-6">
            <p class="text-sm text-gray-600">Already have an account? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Login here</a></p>
        </div>
    </div>
</body>
</html>
