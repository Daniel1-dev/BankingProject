<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Create Account</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 200% 200%;
    animation: gradientShift 10s ease infinite;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
}

/* Animated background gradient */
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Floating particles effect */
body::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/></svg>') no-repeat bottom;
    background-size: cover;
    opacity: 0.3;
    pointer-events: none;
}

.container {
    width: 100%;
    max-width: 450px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 40px 35px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    z-index: 1;
}

.container:hover {
    transform: translateY(-5px);
    box-shadow: 0 30px 55px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
}

.subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 30px;
}

.input-group {
    margin-bottom: 20px;
    position: relative;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 16px;
    outline: none;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: #f9fafb;
    font-weight: 500;
}

.input-group input:focus {
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}

.input-group input:hover:not(:focus) {
    border-color: #c7d2fe;
    background: #ffffff;
}

/* Icon placeholders (optional visual enhancement) */
.input-group {
    position: relative;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transition: left 0.5s ease;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
}

button:hover::before {
    left: 100%;
}

button:active {
    transform: scale(0.98);
}

.bottom-text {
    margin-top: 25px;
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
}

.bottom-text a {
    text-decoration: none;
    color: #667eea;
    font-weight: 700;
    margin-left: 5px;
    transition: all 0.3s ease;
    position: relative;
}

.bottom-text a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: width 0.3s ease;
}

.bottom-text a:hover {
    color: #764ba2;
}

.bottom-text a:hover::after {
    width: 100%;
}

/* Error message styling (in case you add form errors later) */
.error-message {
    color: #ef4444;
    font-size: 0.75rem;
    margin-top: 5px;
    margin-left: 12px;
}

/* Responsive adjustments */
@media (max-width: 480px) {
    .container {
        padding: 30px 20px;
    }
    
    h1 {
        font-size: 1.8rem;
    }
    
    .input-group input {
        padding: 12px 14px;
        font-size: 0.9rem;
    }
    
    button {
        padding: 12px;
    }
}

/* Smooth number input spinner removal (optional) */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
    opacity: 0.5;
}
</style>
</head>
<body>
<div class="container">
    <h1>✨ Create Account</h1>
    <div class="subtitle">Join us and start your journey</div>
   <form method="POST">
    {% csrf_token %}

    <div class="input-group">
        <label>👤 USERNAME</label>
        <input
            type="text"
            name="username"
            placeholder="e.g., Dev-dan"
            required
            autocomplete="username"
        >
    </div>

    <div class="input-group">
        <label>👤 FULL NAME</label>
        <input
            type="text"
            name="full_name"
            placeholder="e.g., John Doe"
            required
            autocomplete="name"
        >
    </div>

    <div class="input-group">
        <label>📧 EMAIL</label>
        <input
            type="email"
            name="email"
            placeholder="hello@example.com"
            required
            autocomplete="email"
        >
    </div>

    <div class="input-group">
        <label>💰 WEEKLY CONTRIBUTION</label>
        <input
            type="number"
            name="weekly_amount"
            placeholder="Amount in NGN"
            required
            min="1"
            step="any"
        >
    </div>

    <div class="input-group">
        <label>🔒 PASSWORD</label>
        <input
            type="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="new-password"
        >
    </div>

    <button type="submit">
        Register →
    </button>
</form>
    
    <div class="bottom-text">
        Already have an account?
        <a href="{% url 'login' %}">
            Sign in
        </a>
    </div>
</div>
</body>
</html>
